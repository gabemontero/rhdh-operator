apiVersion: apps/v1
kind: Deployment
spec:
  template:
    spec:
      initContainers:
        - name: init-rag-data
          image: 'quay.io/redhat-ai-dev/rag-content:release-1.9-lcs'
          command:
            - "sh"
            - "-c"
            - "echo 'Copying RAG data...'; cp -r /rag/vector_db/rhdh_product_docs /data/ && cp -r /rag/embeddings_model /data/ && chmod -R 777 /data/rhdh_product_docs && echo 'Copy complete.'"
          volumeMounts:
            - mountPath: /data
              name: rag-content

      containers:

       # Llama Stack AI Service
       - name: llama-stack
         image: quay.io/redhat-ai-dev/llama-stack:0.1.4
         imagePullPolicy: Always
         #securityContext:
         #  readOnlyRootFilesystem: false    # temporary, experimental
         envFrom:
           - secretRef:
               name: llama-stack-secrets
         volumeMounts:
           - mountPath: /app-root/.llama
             name: shared-storage
           - mountPath: /rag-content
             name: rag-content
           - mountPath: /tmp              # Add this to make /tmp writable
             name: temp

        # Lightspeed Core Backend
       - name: lightspeed-core
         image: quay.io/lightspeed-core/lightspeed-stack:0.4.0
         imagePullPolicy: Always
         ports:
           - containerPort: 8080
             name: lcs-backend
             protocol: TCP
         volumeMounts:
           - mountPath: /tmp/data/feedback
             name: shared-storage
           - mountPath: /app-root/lightspeed-stack.yaml
             name: lightspeed-stack
             subPath: lightspeed-stack.yaml

      volumes:
        - name: shared-storage
          emptyDir: {}
        - name: rag-content
          emptyDir: {}
        - name: lightspeed-stack
          configMap:
            name: lightspeed-stack.yaml
        - name: kube-api-access
          projected:
           defaultMode: 420
           sources:
             - serviceAccountToken:
                 expirationSeconds: 3600
                 path: token
             - configMap:
                 name: kube-root-ca.crt
                 items:
                   - key: ca.crt
                     path: ca.crt
             - downwardAPI:
                 items:
                   - path: namespace
                     fieldRef:
                       fieldPath: metadata.namespace
